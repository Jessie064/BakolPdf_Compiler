<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PDF Compiler{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── CSS Variables ─────────────────────────────── */
    :root {
      --bg-primary:   #ffffff;
      --bg-secondary: #f8fafc;
      --bg-card:      #ffffff;
      --bg-card-hover:#f1f5f9;
      --border:       #e2e8f0;
      --border-glow:  rgba(99,102,241,0.3);
      --accent:       #4f46e5;
      --accent-light: #6366f1;
      --accent-dark:  #4338ca;
      --success:      #10b981;
      --danger:       #ef4444;
      --warning:      #f59e0b;
      --text-primary: #0f172a;
      --text-secondary:#475569;
      --text-muted:   #64748b;
      --radius:       12px;
      --radius-sm:    8px;
      --shadow:       0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
      --shadow-glow:  0 10px 15px -3px rgba(99,102,241,0.1);
    }

    /* ─── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 15px rgba(99,102,241,0.4);
    }

    .logo-text {
      font-size: 1.15rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ─── Progress Steps ──────────────────────────────── */
    .progress-bar {
      display: flex;
      align-items: center;
      gap: 0;
      margin-left: auto;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.3s;
    }

    .step.active {
      background: rgba(99,102,241,0.15);
      color: var(--accent-light);
      border: 1px solid rgba(99,102,241,0.3);
    }

    .step.done {
      color: var(--success);
    }

    .step-num {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
    }

    .step-connector {
      width: 24px;
      height: 1px;
      background: var(--border);
    }

    /* ─── Main ───────────────────────────────────────── */
    main {
      flex: 1;
      position: relative;
      z-index: 1;
      padding: 3rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .page-header h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: 0.6rem;
    }

    .page-header p {
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 400;
    }

    /* ─── Card ───────────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      backdrop-filter: blur(20px);
      width: 100%;
      max-width: 680px;
      box-shadow: var(--shadow), var(--shadow-glow);
    }

    /* ─── Buttons ────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      box-shadow: 0 4px 20px rgba(99,102,241,0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(99,102,241,0.5);
    }

    .btn-success {
      background: linear-gradient(135deg, var(--success), #059669);
      color: #fff;
      box-shadow: 0 4px 20px rgba(16,185,129,0.3);
    }

    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(16,185,129,0.5);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .btn-ghost:hover {
      border-color: var(--border-glow);
      color: var(--text-primary);
      background: var(--bg-card-hover);
    }

    .btn-danger {
      background: transparent;
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--danger);
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
    }

    .btn-danger:hover {
      background: rgba(239,68,68,0.1);
      border-color: var(--danger);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-full { width: 100%; justify-content: center; }

    /* ─── Alert ──────────────────────────────────────── */
    .alert {
      padding: 0.85rem 1.1rem;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
    }

    .alert-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.85rem 1rem;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 0.6rem;
      transition: all 0.2s;
      animation: slideIn 0.3s ease forwards;
    }

    .file-item:hover { background: var(--bg-card-hover); border-color: #cbd5e1; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }

    .file-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .file-info { flex: 1; min-width: 0; }
    .file-name {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-size { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

    /* ─── Divider ─────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    /* ─── Footer ─────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.25rem;
      color: var(--text-muted);
      font-size: 0.78rem;
      border-top: 1px solid var(--border);
    }

    /* ─── Spinner ────────────────────────────────────── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Empty State ─────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.6rem; }
    .empty-state p { font-size: 0.875rem; }

    /* ─── Responsive ──────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 1rem; flex-wrap: wrap; }
      .progress-bar { width: 100%; justify-content: center; margin-top: 0.5rem; }
      main { padding: 2rem 1rem; }
      .card { padding: 1.25rem; }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

<header>
  <a href="/" class="logo">
    <div class="logo-icon">📎</div>
    <span class="logo-text">BakolPdf Compiler</span>
  </a>

  <nav class="progress-bar" aria-label="Steps">
    <div class="step {% block step1_class %}{% endblock %}">
      <span class="step-num">1</span> Upload
    </div>
    <div class="step-connector"></div>
    <div class="step {% block step2_class %}{% endblock %}">
      <span class="step-num">2</span> Arrange
    </div>
    <div class="step-connector"></div>
    <div class="step {% block step3_class %}{% endblock %}">
      <span class="step-num">3</span> Download
    </div>
  </nav>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  BakolPdf Compiler &mdash; merge your PDFs instantly &bull; Max 20 MB per file
</footer>

{% block extra_js %}{% endblock %}
</body>
</html>
